# pyproject.toml for Linux with CUDA 13.x
# Copy this to pyproject.toml when deploying on Linux (Amazon Linux 2023)
#
# SETUP:
# 1. uv sync
# 2. Set: export HF_TOKEN=hf_xxx
# 3. Install ffmpeg: sudo dnf install -y ffmpeg-free

[project]
name = "diarization"
version = "0.1.0"
description = "Audio transcription and speaker diarization"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "faster-whisper>=1.2.1",
    "pyannote-audio>=4.0",
    "pandas>=2.0",
    "python-dotenv>=1.0",
    "torch>=2.11",
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["diarization"]
