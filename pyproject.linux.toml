# pyproject.toml for Linux
# Copy this to pyproject.toml when deploying on Linux
#
# SETUP:
# 1. uv sync
# 2. Set: export HF_TOKEN=hf_xxx
# 3. Install ffmpeg: sudo apt-get install -y ffmpeg

[project]
name = "diarization"
version = "0.1.0"
description = "Audio transcription and speaker diarization"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "faster-whisper>=1.2.1",
    "pyannote-audio==3.3.2",
    "huggingface_hub>=0.18,<1.0",
    "pandas>=2.0",
    "python-dotenv>=1.0",
    "torch>=2.4.0,<2.6",
    "torchaudio>=2.4.0,<2.6",
]

[[tool.uv.index]]
url = "https://download.pytorch.org/whl/cu124"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["diarization"]
